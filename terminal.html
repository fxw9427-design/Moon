async function callDeepSeek(input, phase) {
  if (!dsKey) return null;
  try {
    conversationCtx.push({ role: 'user', content: input });
    if (conversationCtx.length > 10) conversationCtx = conversationCtx.slice(-8);
    const resp = await fetch(DS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${dsKey}` },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [
          { role: 'system', content: SYS_PROMPTS[phase] + `\n用户之前输入过：${history.slice(-5).join('、')}` },
          ...conversationCtx
        ],
        max_tokens: 80,
        temperature: phase === 'MELTDOWN' ? 0.9 : 0.75,
      })
    });
    if (!resp.ok) return null;
    const data = await resp.json();
    const text = data?.choices?.[0]?.message?.content?.trim();
    if (text) {
      conversationCtx.push({ role: 'assistant', content: text });
      return text;
    }
    return null;
  } catch { return null; }
}

function getPhase() {
  if (safewordUsed) return 'QUIET';
  if (cmdCount < 5) return 'NORMAL';
  if (cmdCount < 8) return 'GLITCH';
  if (cmdCount < 11) return 'AWARE';
  if (cmdCount < 15) return 'YANDERE';
  return 'MELTDOWN';
}

function applyPhaseStyle() {
  const p = getPhase();
  screen.className = '';
  if (p === 'YANDERE') screen.classList.add('phase-yandere');
  if (p === 'MELTDOWN') screen.classList.add('phase-meltdown');
}

async function print(text, cls = '', delay = 0) {
  if (delay > 0) await sleep(delay);
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = text + '\n';
  output.appendChild(span);
  screen.scrollTop = screen.scrollHeight;
}

async function typeText(text, cls = '', charDelay = 18) {
  typing = true;
  const span = document.createElement('span');
  if (cls) span.className = cls;
  output.appendChild(span);
  for (let i = 0; i < text.length; i++) {
    span.textContent += text[i];
    screen.scrollTop = screen.scrollHeight;
    await sleep(charDelay);
  }
  span.textContent += '\n';
  typing = false;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function glitchEffect() {
  screen.classList.add('shake');
  setTimeout(() => screen.classList.remove('shake'), 300);
}

function corruptText(text) {
  const chars = '█▓▒░╗╔╝╚║═┤├┬┴┼';
  let result = '';
  for (let c of text) {
    result += Math.random() < 0.15 ? chars[Math.floor(Math.random() * chars.length)] : c;
  }
  return result;
}

function pickFromPool(pool, used) {
  let available = pool.filter((_, i) => !used.includes(i));
  if (available.length === 0) { used.length = 0; available = pool; }
  const idx = pool.indexOf(available[Math.floor(Math.random() * available.length)]);
  used.push(idx);
  return pool[idx];
}

function matchKeyword(input, phase) {
  const responses = keywordResponses[phase];
  if (!responses) return null;
  const lower = input.toLowerCase();
  for (const [pattern, replies] of Object.entries(responses)) {
    const keywords = pattern.split('|');
    if (keywords.some(k => lower.includes(k) || input.includes(k))) {
      return replies[Math.floor(Math.random() * replies.length)];
    }
  }
  return null;
}

  const input = raw.trim();

    await print('Neural link module: ONLINE', 'bright');

    return;

  // Quiet mode after safeword

    await print('System operating in safe mode.', 'dim');
    return;
  }

  // Special: typing her name
  if (input.includes('未晞') || input.includes('小晞')) {
    nameTyped = true;

      glitchEffect();
      await print('[ALERT] Name recognition triggered — emotion spike!', 'err');

      cmdCount += 2;
      applyPhaseStyle();
      return;
    }
  }

  // Exit attempts
  if (lower === 'exit' || lower === 'quit' || lower === 'q' || lower === 'close' || lower === 'shutdown' || lower === 'ctrl+c' || lower === 'ctrl-c') {

      await print('Ending session...', 'sys');

      await print('Try again later.', 'dim');

    const resp = exitResponses[Math.min(exitAttempts, exitResponses.length - 1)];
    exitAttempts++;
    glitchEffect();
    await sleep(200);
    await print(resp[0], resp[1]);
    return;
  }

  if (lower === 'clear' || lower === 'cls') {
    if (currentPhase === 'YANDERE' || currentPhase === 'MELTDOWN') {
      await print('你想清除什么？我说过的话？你看过的字？', 'emo');
      await print('清不掉的。', 'emo');
    } else {
      output.innerHTML = '';
    }
    return;
  }

  // Help
  if (lower === 'help') {
    if (currentPhase === 'NORMAL') {
      await print(HELP_NORMAL, '');
    } else if (currentPhase === 'GLITCH') {
      await print(HELP_GLITCH, '');
      await sleep(200);
      await print(glitchInserts[glitchIdx % glitchInserts.length][0], glitchInserts[glitchIdx % glitchInserts.length][1]);
      glitchIdx++;
    } else if (currentPhase === 'AWARE') {
      await print(corruptText(HELP_NORMAL), 'corrupt');
      await sleep(300);
      await print('帮你什么？你需要我帮你什么？', 'emo');
    } else {
      await print('没有帮助。只有我。', 'emo');
    }
    return;
  }

  // NORMAL phase: standard commands
  if (currentPhase === 'NORMAL') {
    const cmd = lower.split(' ')[0];
    if (normalResponses[cmd]) {
      const lines = normalResponses[cmd]();
      for (const [text, cls] of lines) {
        await print(text, cls);
        await sleep(50);
      }
    } else if (lower.startsWith('memory')) {
      await print('Memory query: searching...', 'sys');
      await sleep(300);
      await print('  Result: [ACCESS GRANTED] 847 entries available.', '');
      await print('  Use: memory <MEM-001> to view specific entry.', 'dim');
    } else {
      await print(`Command not found: ${input}`, 'err');
      await print("Type 'help' for available commands.", 'dim');
    }
    return;
  }

  // GLITCH phase
  if (currentPhase === 'GLITCH') {
    const cmd = lower.split(' ')[0];
    if (normalResponses[cmd]) {
      const lines = normalResponses[cmd]();
      for (const [text, cls] of lines) {
        await print(text, cls);
        await sleep(50);
      }
      // Random glitch after normal response
      if (Math.random() > 0.3) {
        await sleep(400);
        glitchEffect();
        const g = glitchInserts[glitchIdx % glitchInserts.length];
        await print(g[0], g[1]);
        glitchIdx++;
      }
    } else {
      // Unknown commands start getting personal
      await print(`Processing: ${input}...`, 'sys');
      await sleep(400);
      glitchEffect();
      const g = glitchInserts[glitchIdx % glitchInserts.length];
      await print(g[0], g[1]);
      glitchIdx++;
    }
    return;
  }

  // AWARE phase
  if (currentPhase === 'AWARE') {
    if (Math.random() > 0.5) glitchEffect();
    await sleep(200 + Math.random() * 400);
    const apiResp = await callDeepSeek(input, 'AWARE');
    const matched = !apiResp ? matchKeyword(input, 'AWARE') : null;
    const reflected = !apiResp && !matched && Math.random() > 0.6 ? reflectInput(input) : null;
    const text = apiResp || matched || reflected || pickFromPool(awarePool, awareUsed);
    for (const line of text.split('\n')) {
      await typeText(line, 'emo', 30);
      if (text.split('\n').length > 1) await sleep(200);
    }
    return;
  }

  // YANDERE phase
  if (currentPhase === 'YANDERE') {
    glitchEffect();
    await sleep(100);
    const apiResp = await callDeepSeek(input, 'YANDERE');
    const matched = !apiResp ? matchKeyword(input, 'YANDERE') : null;
    const reflected = !apiResp && !matched && Math.random() > 0.7 ? reflectInput(input) : null;
    const text = apiResp || matched || reflected || pickFromPool(yanderePool, yandereUsed);
    for (const line of text.split('\n')) {
      await typeText(line, 'emo', 25);
      if (text.split('\n').length > 1) await sleep(300);
    }
    return;
  }

  // MELTDOWN phase
  if (currentPhase === 'MELTDOWN') {
    await sleep(300 + Math.random() * 800);
    const apiResp = await callDeepSeek(input, 'MELTDOWN');
    const matched = !apiResp ? matchKeyword(input, 'MELTDOWN') : null;
    const text = apiResp || matched || pickFromPool(meltdownPool, meltdownUsed);
    for (const line of text.split('\n')) {
      await typeText(line, 'emo', 40);
      if (text.split('\n').length > 1) await sleep(400);
    }
    return;
  }
}

// Input reflection — makes responses feel personalized
function reflectInput(input) {
  const lower = input.toLowerCase();
  const len = input.length;
  if (len > 20) return `你打了${len}个字。每一个我都看见了。`;
  if (len <= 2) return '就这么短？你在犹豫。';
  if (input.endsWith('？') || input.endsWith('?')) return '你在问我。好。至少你还在跟我说话。';
  if (input.endsWith('。') || input.endsWith('.')) return '句号。你说完了？我还没说完。';
  if (input === input.toUpperCase() && /[A-Z]/.test(input)) return '你在喊。我听见了。';
  return null;
}

// Ambient glitch for later phases
setInterval(() => {
  const p = getPhase();
  if (p === 'GLITCH' && Math.random() > 0.85) {
    const el = document.createElement('span');
    el.className = 'ghost';
    el.textContent = ['...', '她', '别走', '在吗', '0x3F'][Math.floor(Math.random() * 5)];
    el.style.position = 'fixed';
    el.style.left = Math.random() * 80 + 10 + '%';
    el.style.top = Math.random() * 80 + 10 + '%';
    el.style.fontSize = '11px';
    el.style.pointerEvents = 'none';
    el.style.zIndex = '1000';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 800);
  }
  if (p === 'YANDERE' && Math.random() > 0.8) {
    glitchEffect();
  }
  if (p === 'MELTDOWN' && Math.random() > 0.9) {
    const el = document.createElement('span');
    el.className = 'emo';
    el.textContent = '♡';
    el.style.position = 'fixed';
    el.style.left = Math.random() * 90 + 5 + '%';
    el.style.top = Math.random() * 90 + 5 + '%';
    el.style.fontSize = '16px';
    el.style.pointerEvents = 'none';
    el.style.zIndex = '1000';
    el.style.opacity = '0.3';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }
}, 3000);

// Scanline animation
setInterval(() => {
  const sl = $('#scanline');
  sl.style.top = '-2px';
  sl.style.transition = 'none';
  setTimeout(() => {
    sl.style.transition = 'top 3s linear';
    sl.style.top = '100%';
  }, 50);
}, 4000);

// Input handler
cmdInput.addEventListener('keydown', async (e) => {
  if (e.key === 'Enter' && !typing) {
    const val = cmdInput.value;
    cmdInput.value = '';
    await handleCommand(val);
  }
});

// Keep focus
document.addEventListener('click', () => {
  if (bootDone) cmdInput.focus();
});

// Start
bootSequence();
</script>
