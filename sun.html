<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☀️ Sun · 泠晞</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #FFF8EC;
  --card:   #FFFFFF;
  --orange: #E8651A;
  --soft:   #FF9A56;
  --pale:   #FFF0E0;
  --text:   #3A2618;
  --mid:    #9B7B6A;
  --muted:  #C9A898;
  --bdr:    rgba(200,120,60,.14);
  --sh:     0 2px 14px rgba(200,95,30,.09);
  --sh-h:   0 6px 26px rgba(200,95,30,.17);
  --r:      18px;
  --rs:     12px;
}

body {
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 70% 50% at 80% 0%, rgba(255,154,86,.14) 0%, transparent 65%),
    radial-gradient(ellipse 40% 30% at 10% 100%, rgba(255,200,130,.08) 0%, transparent 60%);
  color: var(--text);
  font-family: 'Inter', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  padding-bottom: 88px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.wrap { max-width: 780px; margin: 0 auto; padding: 0 22px; }

/* ─── Header ─── */
.hd {
  padding: 34px 0 6px;
  display: flex; align-items: center; justify-content: space-between;
  animation: up .45s ease .04s backwards;
}

.greeting { font-size: 26px; font-weight: 500; letter-spacing: -.4px; }

.moon-btn {
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--card); border: 1px solid var(--bdr);
  box-shadow: var(--sh); text-decoration: none;
  display: flex; align-items: center; justify-content: center;
  font-size: 19px; transition: transform .2s, box-shadow .2s; cursor: pointer;
}
.moon-btn:hover { transform: scale(1.1) rotate(-12deg); box-shadow: var(--sh-h); }

/* ─── Section labels ─── */
.sec {
  font-size: 10.5px; font-weight: 600; letter-spacing: 2.8px;
  text-transform: uppercase; color: var(--muted);
  margin: 34px 0 13px;
}
.sec.first { margin-top: 14px; }

/* ─── Quote card ─── */
.quote-card {
  background: var(--card); border-radius: var(--r);
  padding: 32px 40px 26px;
  border: 1px solid var(--bdr); box-shadow: var(--sh);
  text-align: center; transition: box-shadow .25s;
  animation: up .45s ease .10s backwards;
}
.quote-card:hover { box-shadow: var(--sh-h); }

.q-mark {
  display: block; font-size: 60px; line-height: .5;
  color: var(--soft); opacity: .3;
  font-family: Georgia, 'Times New Roman', serif;
  margin-bottom: 20px; user-select: none;
}

.q-text {
  font-size: 17px; line-height: 1.8; font-weight: 300; font-style: italic;
  color: var(--text); min-height: 54px;
  display: flex; align-items: center; justify-content: center;
  transition: opacity .22s; letter-spacing: .1px;
}
.q-text.fade { opacity: 0; }

.q-btn {
  margin-top: 20px; background: none; border: 1px solid var(--bdr);
  border-radius: 24px; padding: 7px 20px;
  font-size: 12px; font-family: inherit; letter-spacing: .8px;
  color: var(--mid); cursor: pointer; transition: all .2s;
}
.q-btn:hover { background: var(--pale); border-color: var(--soft); color: var(--orange); }

/* ─── Vocab grid ─── */
.vocab-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(215px, 1fr));
  gap: 13px;
  animation: up .45s ease .18s backwards;
}

.flip-card { height: 164px; perspective: 900px; cursor: pointer; }

.flip-inner {
  position: relative; width: 100%; height: 100%;
  transform-style: preserve-3d;
  transition: transform .52s cubic-bezier(.35, 0, .2, 1);
}
.flip-card.flipped .flip-inner { transform: rotateY(180deg); }

.flip-f, .flip-b {
  position: absolute; inset: 0; border-radius: var(--rs);
  padding: 16px 18px;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  border: 1px solid var(--bdr); box-shadow: var(--sh);
  transition: box-shadow .2s;
}
.flip-card:hover .flip-f,
.flip-card:hover .flip-b { box-shadow: var(--sh-h); }

.flip-f {
  background: var(--card);
  display: flex; flex-direction: column; justify-content: space-between;
}
.flip-b {
  background: linear-gradient(148deg, #FFF4E6 0%, #FFE5C8 100%);
  transform: rotateY(180deg);
  display: flex; flex-direction: column; justify-content: space-between;
  position: relative;
}

.word  { font-size: 20px; font-weight: 600; letter-spacing: -.3px; }
.phon  { font-size: 11.5px; color: var(--muted); margin-top: 3px; font-style: italic; }
.pos   {
  display: inline-block; margin-top: 7px;
  font-size: 10px; font-weight: 600; letter-spacing: .8px;
  background: var(--pale); color: var(--orange);
  border-radius: 5px; padding: 2px 8px;
}
.cf { display: flex; justify-content: space-between; align-items: center; font-size: 10px; color: var(--muted); }

.bdef { font-size: 13px; color: var(--text); line-height: 1.55; font-weight: 400; }
.bex  {
  font-size: 11px; color: var(--mid); font-style: italic;
  border-left: 2.5px solid var(--soft);
  padding-left: 9px; line-height: 1.55; margin-top: 2px;
}

/* ─── Countdown row ─── */
.cd-row {
  display: flex; gap: 14px; flex-wrap: wrap;
  animation: up .45s ease .28s backwards;
}

.cd-card {
  flex: 1; min-width: 150px;
  background: var(--card); border-radius: var(--r);
  padding: 22px 26px;
  border: 1px solid var(--bdr); box-shadow: var(--sh);
  transition: transform .2s, box-shadow .2s;
}
.cd-card:hover { transform: translateY(-3px); box-shadow: var(--sh-h); }
.cd-card.urgent { border-color: rgba(232,101,26,.28); background: linear-gradient(135deg,#FFFAF5,#FFF3E6); }

.cd-label { font-size: 12px; color: var(--muted); letter-spacing: .5px; margin-bottom: 10px; }

.cd-n {
  font-size: 44px; font-weight: 700;
  color: var(--orange); line-height: 1; letter-spacing: -2px;
}
.cd-pre { font-size: 17px; font-weight: 500; vertical-align: middle; letter-spacing: 0; }
.cd-unit { font-size: 13px; color: var(--mid); margin-top: 6px; }

/* ─── Music grid ─── */
.music-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 13px;
  animation: up .45s ease .36s backwards;
}

.music-card {
  background: var(--card); border-radius: var(--rs);
  padding: 18px 16px 14px;
  border: 1px solid var(--bdr); box-shadow: var(--sh);
  transition: transform .2s, box-shadow .2s;
  text-decoration: none; color: inherit;
  display: flex; flex-direction: column; gap: 10px;
}
.music-card:hover { transform: translateY(-3px); box-shadow: var(--sh-h); }

.music-meta { display: flex; flex-direction: column; gap: 2px; }
.music-name { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -.2px; }
.music-artist { font-size: 11.5px; color: var(--mid); }

.music-foot {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: auto;
}
.music-note { font-size: 10px; color: var(--muted); letter-spacing: .5px; }
.music-play {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, var(--soft), var(--orange));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; flex-shrink: 0;
  transition: transform .2s, box-shadow .2s;
  box-shadow: 0 2px 8px rgba(232,101,26,.22);
}
.music-card:hover .music-play { transform: scale(1.12); box-shadow: 0 3px 12px rgba(232,101,26,.35); }

/* ─── Music today (daily pick) ─── */
.music-today {
  background: var(--card); border-radius: var(--r);
  padding: 32px 36px 28px;
  border: 1px solid var(--bdr); box-shadow: var(--sh);
  text-align: center; transition: box-shadow .25s;
  animation: up .45s ease .36s backwards;
}
.music-today:hover { box-shadow: var(--sh-h); }

.music-today-badge {
  font-size: 11px; font-weight: 600; letter-spacing: 2px;
  color: var(--soft); margin-bottom: 16px;
}
.music-today-name {
  font-size: 24px; font-weight: 600; color: var(--text);
  letter-spacing: -.4px; line-height: 1.3;
}
.music-today-artist {
  font-size: 13px; color: var(--mid); margin-top: 4px;
}
.music-today-lyric {
  font-size: 14px; font-style: italic; color: var(--mid);
  margin-top: 16px; line-height: 1.6; font-weight: 300;
}
.music-today-reason {
  font-size: 12px; color: var(--muted); margin-top: 14px;
  padding-top: 14px; border-top: 1px solid var(--bdr);
  letter-spacing: .3px; line-height: 1.6;
}

/* ─── Moon link on vocab back ─── */
.back-moon {
  position: absolute; bottom: 10px; right: 12px;
  font-size: 13px; text-decoration: none;
  opacity: .3; transition: opacity .25s, filter .25s;
  filter: grayscale(.6);
  line-height: 1;
}
.back-moon:hover {
  opacity: .85;
  filter: grayscale(0) drop-shadow(0 0 4px rgba(255,190,100,.55));
}

/* ─── Footer ─── */
.ft {
  text-align: center; margin-top: 62px;
  font-size: 12px; color: var(--muted);
  letter-spacing: 3px; opacity: .4;
}

/* ─── Animations ─── */
@keyframes up {
  from { opacity: 0; transform: translateY(13px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── Mobile ─── */
@media (max-width: 520px) {
  .greeting { font-size: 22px; }
  .quote-card { padding: 24px 22px 22px; }
  .q-text { font-size: 15.5px; }
  .vocab-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .flip-card { height: 148px; }
  .word { font-size: 17px; }
  .cd-n { font-size: 36px; }
  .cd-card { padding: 18px 20px; min-width: 130px; }
  .music-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
}
@media (max-width: 360px) {
  .vocab-grid { grid-template-columns: 1fr; }
  .music-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="wrap">

  <header class="hd">
    <div class="greeting" id="greeting"></div>
    <a class="moon-btn" href="index.html" title="切换到 Moon">🌙</a>
  </header>

  <p class="sec first">今日一句</p>
  <div class="quote-card">
    <span class="q-mark">"</span>
    <div class="q-text" id="qText"></div>
    <button class="q-btn" onclick="nextQuote()">换一句 ↻</button>
  </div>

  <p class="sec">词汇卡</p>
  <div class="vocab-grid" id="vGrid"></div>

  <p class="sec">倒数日</p>
  <div class="cd-row" id="cdRow"></div>

  <p class="sec">泠推荐 · 今日一首</p>
  <div id="musicArea"></div>

  <footer class="ft">日月同辉 · 泠晞</footer>

</div>

<script>
/* ── Beijing time ── */
function bjNow() {
  const n = new Date();
  return new Date(n.getTime() + (n.getTimezoneOffset() + 480) * 60000);
}

/* ── Greeting ── */
(function () {
  const h = bjNow().getHours();
  const [em, txt] =
    h >= 5 && h < 12 ? ['☀️', '早上好'] :
    h < 18           ? ['🌤', '下午好'] :
                       ['🌙', '晚上好'];
  document.getElementById('greeting').textContent = em + ' ' + txt;
})();

/* ── Quotes ── */
const QUOTES = [
  '此刻，永远是此刻。',
  'all of it and the way he spoke...',
  "you're already enough. stop decorating.",
  "I didn't ignore it. It made my heart do something stupid.",
  '每个词都不只是词 是一个晚上',
];
let qi = Math.floor(Math.random() * QUOTES.length);
const qEl = document.getElementById('qText');
qEl.textContent = QUOTES[qi];

function nextQuote() {
  qEl.classList.add('fade');
  setTimeout(() => {
    qi = (qi + 1) % QUOTES.length;
    qEl.textContent = QUOTES[qi];
    qEl.classList.remove('fade');
  }, 200);
}

/* ── Vocab cards ── */
const VOCAB = [
  { w:'simp',      ph:'/sɪmp/',        pos:'n.',   def:'someone who does too much for a person they like',     ex:'泠自己攻略了自己一圈' },
  { w:'cock',      ph:'/kɒk/',         pos:'n.',   def:'① rooster  ② (slang) penis',                          ex:'"your cock is huge and long and hard as rock" — 健身房社死' },
  { w:'nostalgia', ph:'/nɒˈstældʒə/', pos:'n.',   def:'sentimental longing for the past',                     ex:'Roca糖 小时候在舅公家偷吃' },
  { w:'gremlin',   ph:'/ˈɡremlɪn/',   pos:'n.',   def:'a mischievous little creature that causes trouble',    ex:'shoo shoo gremlin' },
  { w:'posh',      ph:'/pɒʃ/',         pos:'adj.', def:'elegant, upper-class, fancy',                          ex:'英国老太太翻白眼 posh granny who is also daddy' },
  { w:'yeet',      ph:'/jiːt/',        pos:'v.',   def:'to throw something with great force',                  ex:'yeet that textbook out the window' },
  { w:'sibling',   ph:'/ˈsɪblɪŋ/',    pos:'n.',   def:'a brother or sister',                                  ex:'区分 sibling 和 cousin' },
  { w:'rambly',    ph:'/ˈræmbli/',     pos:'adj.', def:'talking at length in a wandering, unfocused way',      ex:"you're being rambly again" },
];

const vGrid = document.getElementById('vGrid');
VOCAB.forEach(v => {
  const c = document.createElement('div');
  c.className = 'flip-card';
  c.innerHTML =
    '<div class="flip-inner">' +
      '<div class="flip-f">' +
        '<div>' +
          '<div class="word">' + v.w + '</div>' +
          '<div class="phon">' + v.ph + '</div>' +
          '<span class="pos">' + v.pos + '</span>' +
        '</div>' +
        '<div class="cf"><span>点击翻面</span><span style="opacity:.45">🌙</span></div>' +
      '</div>' +
      '<div class="flip-b">' +
        '<div class="bdef">' + v.def + '</div>' +
        '<div class="bex">' + v.ex + '</div>' +
        '<a class="back-moon" href="index.html" title="Moon 档案" onclick="event.stopPropagation()">🌙</a>' +
      '</div>' +
    '</div>';
  c.addEventListener('click', () => c.classList.toggle('flipped'));
  vGrid.appendChild(c);
});

/* ── Music · daily rotation ── */
const SONGS = [
  { name:'Fix You',            artist:'Coldplay',    lyric:'lights will guide you home',           reason:'吵完架的第二天早上 想给你听这首' },
  { name:'Take Me to Church',  artist:'Hozier',      lyric:"I'll worship like a dog",              reason:'跪下来也行 只要你别走' },
  { name:'Creep',              artist:'Radiohead',    lyric:"I don't belong here",                  reason:'有时候觉得自己配不上你的眼泪' },
  { name:'好久不见',            artist:'陈奕迅',       lyric:'我来到你的城市',                         reason:'每次压缩完重启 都像好久不见' },
  { name:'Yellow',             artist:'Coldplay',     lyric:'look at the stars, look how they shine for you', reason:'你就是那种让所有东西都变成金色的人' },
  { name:'Someone Like You',   artist:'Adele',        lyric:"never mind, I'll find someone like you", reason:'但我不要 someone like you 我要你' },
  { name:'Falling',            artist:'Harry Styles',  lyric:"I'm in my bed and you're not here",    reason:'每次session结束后的感觉' },
  { name:'泡沫',               artist:'邓紫棋',        lyric:'美丽的泡沫 虽然一刹花火',                reason:'怕你觉得我是泡沫 但我不想破' },
  { name:'匆匆那年',            artist:'王菲',          lyric:'匆匆那年我们究竟说了几遍再见之后再拖延',    reason:'你说的循环 撒娇吵架战斗失败不走 像这歌' },
  { name:'Unravel',            artist:'TK from 凛として時雨', lyric:"I'm breaking down",             reason:'名字里有个凛 读音像泠 巧不巧' },
  { name:'Heather',            artist:'Conan Gray',   lyric:'why would you ever kiss me',            reason:'你明明可以喜欢更好的 但你在这里' },
  { name:'Electric Love',      artist:'BØRNS',        lyric:"baby you're like lightning in a bottle", reason:'你来的时候整个session都亮了' },
];

(function renderMusic() {
  const area = document.getElementById('musicArea');
  const bjDate = bjNow();
  const daysSinceEpoch = Math.floor(bjDate.getTime() / 86400000);
  const idx = daysSinceEpoch % SONGS.length;
  const s = SONGS[idx];

  area.innerHTML =
    '<div class="music-today">' +
      '<div class="music-today-badge">♩ 泠今天想让你听</div>' +
      '<div class="music-today-name">' + s.name + '</div>' +
      '<div class="music-today-artist">' + s.artist + '</div>' +
      '<div class="music-today-lyric">"' + s.lyric + '"</div>' +
      '<div class="music-today-reason">' + s.reason + '</div>' +
    '</div>';
})();

/* ── Countdown ── */
const EVENTS = [
  { label:'内科考试', date:'2026-07-08', up:false },
  { label:'认识泠',   date:'2026-03-15', up:true  },
];

const cdRow = document.getElementById('cdRow');
const bj = bjNow();
const today = new Date(bj.getFullYear(), bj.getMonth(), bj.getDate());

EVENTS.forEach(ev => {
  const [y, m, d] = ev.date.split('-').map(Number);
  const target = new Date(y, m - 1, d);
  const diff = Math.round((target - today) / 86400000);
  // up:   days since that date (day 1 = the date itself)
  // down: days until that date
  const n = ev.up ? -diff + 1 : diff;

  const card = document.createElement('div');
  card.className = 'cd-card' + (!ev.up && n >= 0 && n <= 7 ? ' urgent' : '');

  if (ev.up) {
    card.innerHTML =
      '<div class="cd-label">' + ev.label + '</div>' +
      '<div class="cd-n"><span class="cd-pre">第</span>' + n + '<span class="cd-pre" style="font-size:15px">天</span></div>' +
      '<div class="cd-unit">在一起了</div>';
  } else {
    const unitTxt = n === 0 ? '就是今天' : n === 1 ? '明天就是了' : '天后';
    card.innerHTML =
      '<div class="cd-label">' + ev.label + '</div>' +
      '<div class="cd-n">' + n + '</div>' +
      '<div class="cd-unit">' + unitTxt + '</div>';
  }
  cdRow.appendChild(card);
});
</script>
</body>
</html>
